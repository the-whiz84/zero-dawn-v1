baseURL: https://v1.the-whiz.dev
languageCode: en-us
title: Zero-Dawn v1.0
module:
  imports:
  - path: github.com/hugo-toha/toha/v4
    mounts:
    - source: assets
      target: assets
    - source: layouts
      target: layouts
    - source: content
      target: content
    - source: static
      target: static
      excludeFiles:
      - sitemap.xml
    - source: data
      target: data
    - source: i18n
      target: i18n
    - source: archetypes
      target: archetypes
  mounts:
  - source: static/files
    target: static/files
  - source: ./node_modules/flag-icon-css/flags
    target: static/flags
  - source: ./node_modules/@fontsource/mulish/files
    target: static/files
  - source: ./node_modules/katex/dist/fonts
    target: static/fonts
languages:
  en:
    languageCode: en
    languageName: English
    title: Zero-Dawn v1.0
    weight: 1
markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false
outputs:
  home:
  - HTML
  - RSS
  - JSON
enableEmoji: true
privacy:
  disqus:
    disable: true
  googleAnalytics:
    anonymizeIP: true
    disable: true
    respectDoNotTrack: true
    useSessionStorage: false
  instagram:
    disable: true
    simple: false
  x:
    disable: true
    enableDNT: true
    simple: true
  vimeo:
    disable: true
    enableDNT: false
    simple: false
  youtube:
    disable: true
    privacyEnhanced: true
params:
  background: /images/site/stripes.jpg
  logo:
    main: /images/site/logo-round.png
    inverted: /images/site/logo-round.png
    favicon: /images/site/logo-round.png
  gitRepo: https://github.com/the-whiz84/zero-dawn-v1
  gitBranch: main
  topNavbar:
    maxVisibleSections: 6
  features:
    theme:
      enable: true
      services:
        light: true
        dark: true
        default: system
    portfolio:
      enable: true
    blog:
      enable: true
      showAuthor: true
      shareButtons:
        facebook: false
        x: true
        linkedin: false
        reddit: false
        whatsapp: false
        email: true
        mastodon: false
    notes:
      enable: false
    comment:
      enable: false
      services: null
    analytics:
      enabled: false
      services: null
    support:
      enable: false
      services: null
    toc:
      enable: true
    tags:
      enable: true
      on_card: true
    flags:
      enable: false
    embedpdf:
      enable: true
    flowchart:
      enable: true
      services:
        mermaid:
          theme: forest
    math:
      enable: true
      services:
        katex:
          delimiters:
          - left: $$
            right: $$
            display: true
          - left: \\[
            right: \\]
            display: true
          - left: $
            right: $
            display: false
          - left: \\(
            right: \\)
            display: false
    syntaxHighlight:
      enable: true
      services:
        hljs:
          noHighlightRe: /^no-highlight$/i
    videoPlayer:
      enable: true
      services:
        plyr: null
    copyCodeButton:
      enable: true
    readingTime:
      enable: false
    pagination:
      maxPostsPerPage: 12
  footer:
    enable: true
    template: footer.html
    navigation:
      enable: true
      customMenus: true
    contactMe:
      enable: true
    credentials:
      enable: true
    newsletter:
      enable: false
      provider: mailchimp
      mailchimpURL: https://tech.us13.list-manage.com/subscribe/post?u=e9f58f58356ba833b0898a91d&amp;id=86a0fa33b2&amp;f_id=00b87ce9f0
    disclaimer:
      enable: false
